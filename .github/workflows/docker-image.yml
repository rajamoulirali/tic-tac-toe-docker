name: Docker Image CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: docker build ubuntu-latest .
      
    - uses: actions/checkout@v4
    - name: run the Docker image
      run: docker build --it -name cont -p 9898:80 ubuntu-latest
      
